<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lesson | The Faith Experiment</title><link rel="stylesheet" href="styles.css?v=20260720-6"><style>.lesson-main .source-box{background:#e8f0f5;border-left-color:#173f67}.lesson-main .notebook-box{background:#fff3d8;border-color:#b58a33}.lesson-tone-blue{background:#eef4f8!important}.lesson-tone-gold{background:#fff5dc!important;--c:var(--gold)}.lesson-tone-green{background:#eef4e9!important;--c:#819766}.lesson-stage{margin:18px 0;border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden;box-shadow:0 7px 18px rgba(16,24,32,.05)}.lesson-stage>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:16px;padding:22px 24px}.lesson-stage>summary::-webkit-details-marker{display:none}.lesson-stage>summary h2{margin:2px 0 0;font-size:30px}.lesson-stage>summary::after{content:'＋';margin-left:auto;color:var(--blue);font:bold 22px Arial,sans-serif}.lesson-stage[open]>summary::after{content:'−'}.lesson-stage[open]>summary{border-bottom:1px solid var(--line);background:var(--paper-2)}.stage-body{padding:24px}.step-number{display:grid;place-items:center;flex:0 0 44px;width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;font:bold 18px Arial,sans-serif}.instruction{padding:20px 22px;margin:20px 0;border-left:6px solid var(--gold);border-radius:14px;background:#fff8e7}.instruction strong{display:block;margin-bottom:6px}.reading-card{padding:24px;border:1px solid var(--line);border-radius:16px;background:#fff}.reading-card a{color:var(--blue);font-weight:bold}.note-method{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:20px 0}.note-method article{padding:18px;border:1px solid var(--line);border-radius:14px;background:#fff}.note-method strong{display:block;color:var(--blue);font-size:18px}.objection-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin:24px 0}.objection-card{padding:22px;border:1px solid var(--line);border-top:6px solid var(--c,var(--blue));border-radius:18px;background:#fff}.journal-invite{margin:26px 0 8px;padding:24px;border:1px solid var(--line);border-left:7px solid #66507d;border-radius:16px;background:#f1eaf2}.journal-invite h3{margin:0 0 8px}.journal-invite a{font-weight:bold;color:var(--blue)}.lesson-reflection{margin:20px 0 8px;padding:24px;border:1px solid var(--line);border-left:7px solid var(--gold);border-radius:16px;background:#fff8e7}.lesson-reflection h3{margin:0 0 10px}.lesson-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px}.complete-button{padding:14px 20px;border:2px solid var(--blue);border-radius:28px;background:var(--blue);color:#fff;font:bold 15px Arial,sans-serif;cursor:pointer}.complete-button.done{background:#55705f;border-color:#55705f}.sidebar-note{padding:14px;border-radius:12px;background:#fff;border:1px solid var(--line)}@media(max-width:900px){.objection-grid,.note-method{grid-template-columns:1fr}.lesson-stage>summary{padding:18px 16px;gap:12px}.lesson-stage>summary h2{font-size:24px}.stage-body{padding:20px 16px}.step-number{flex-basis:38px;width:38px;height:38px}}</style></head><body><div class="app"><nav class="side-nav"><div class="side-logo">✠</div><a href="index.html#home">⌂<br>Home</a><a class="on" href="course.html">▤<br>Course</a><a href="index.html#schedule">◫<br>Schedule</a><a href="materials.html">▣<br>Materials</a><a href="journal.html">✎<br>Journal</a><a href="index.html#contact">✉<br>Contact</a></nav><div class="page-shell"><main class="view" id="lesson-root"></main><footer class="footer">Begin honestly, read carefully, distinguish clearly, and leave evidence of what changed.</footer></div></div><script>
const L={
2:{title:'What revelation is',module:'God and Revelation',aim:'understand revelation as God freely making himself and his saving purpose known, rather than merely supplying religious information.',reading:'Joseph Deharbe, Part I, Chapter I, §§1–3: faith, its object and mysteries.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chapter_1:_On_Faith_in_General',ccc:'Catechism of the Catholic Church, 50–73',bible:'Exodus 3:1–15 and Hebrews 1:1–3',points:['God acts and speaks','God reveals himself','Faith is a human response'],surprise:'A letter can communicate facts about its writer; a relationship allows the writer to give something of himself. Catholic revelation claims something closer to the second.',obs:['“Religion is only humanity searching for God.”','“Revelation would destroy human freedom.”','“Private experience is enough.”'],demo:'Explain the difference between God revealing facts and God revealing himself.'},
3:{title:'Scripture and Tradition',module:'God and Revelation',aim:'explain how one apostolic revelation is handed on through Sacred Scripture and Sacred Tradition within the Church.',reading:'Joseph Deharbe, Part I, Chapter I, §§4–5: Holy Scripture and Tradition.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chapter_1:_On_Faith_in_General',ccc:'Catechism of the Catholic Church, 74–100',bible:'2 Thessalonians 2:15 and 2 Timothy 3:14–17',points:['Scripture is inspired and written','Tradition hands on the apostolic faith','The Magisterium serves the Word'],surprise:'The New Testament did not fall from the sky as a completed volume. It arose within the preaching, worship and memory of the apostolic Church.',obs:['“Tradition is only human custom.”','“The Bible needs no interpretation.”','“The Magisterium stands above Scripture.”'],demo:'Draw a simple diagram showing Scripture, Tradition and the Magisterium without treating them as rival authorities.'},
4:{title:'Who is Jesus?',module:'Christ and Salvation',aim:'explain why the Church professes Jesus Christ as one divine Person who is truly God and truly human.',reading:'Joseph Deharbe, Second Article, especially §§1–3: Jesus Christ, true God and true man.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Second_Article',ccc:'Catechism of the Catholic Church, 422–483',bible:'John 1:1–18 and Philippians 2:5–11',points:['One divine Person','A true divine nature','A true human nature'],surprise:'Christianity does not present Jesus as halfway between God and humanity. Its more difficult claim is that he is fully both.',obs:['“Jesus was only a moral teacher.”','“Divinity makes his humanity unreal.”','“The doctrine was invented later.”'],demo:'Explain why “true God and true man” is more precise than saying Jesus was partly God and partly human.'},
5:{title:'Cross and Resurrection',module:'Christ and Salvation',aim:'understand why the death and Resurrection of Christ form one saving mystery at the centre of Christian faith.',reading:'Joseph Deharbe, Fourth and Fifth Articles: the Passion, death, burial, descent and Resurrection of Christ.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion',ccc:'Catechism of the Catholic Church, 571–658',bible:'Mark 15:33–16:8 and 1 Corinthians 15:1–20',points:['A real human death','A saving self-offering','A real Resurrection'],surprise:'The earliest Christians did not hide the shame of crucifixion. They made it the place where divine love, human violence and forgiveness collide.',obs:['“A loving God would not require sacrifice.”','“The Resurrection is only a symbol.”','“The Cross was merely political failure.”'],demo:'Explain how the Cross and Resurrection belong together rather than forming two separate messages.'},
6:{title:'Grace and freedom',module:'Christ and Salvation',aim:'distinguish God’s free gift of grace from human response, and show how grace heals rather than abolishes freedom.',reading:'Joseph Deharbe, Part III, Chapter I: grace, its necessity, action and human cooperation.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion',ccc:'Catechism of the Catholic Church, 1987–2029',bible:'John 15:1–11 and Ephesians 2:4–10',points:['Grace is freely given','Freedom truly responds','Merit begins in grace'],surprise:'A gift can be entirely unearned and still require a real response. Catholic teaching insists on both truths.',obs:['“Grace makes effort irrelevant.”','“Good works purchase salvation.”','“Freedom requires independence from God.”'],demo:'Explain why Catholic teaching rejects both self-salvation and a passive idea of faith.'},
7:{title:'Why matter matters',module:'Sacraments and Christian Life',aim:'explain why the Church believes created matter and visible signs can communicate invisible grace.',reading:'Joseph Deharbe, Part III, Chapter II, opening questions on the sacraments.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chap._II._The_Sacraments',ccc:'Catechism of the Catholic Church, 1066–1134 and 1210–1212',bible:'John 1:14 and John 9:1–7',points:['Creation is good','Christ uses visible signs','Sacraments communicate grace'],surprise:'Catholic worship takes physical reality unusually seriously. Bodies, gestures and objects are not distractions from spiritual life; they can become its instruments.',obs:['“Rituals cannot change the soul.”','“Matter is too ordinary for grace.”','“Sacraments are only community symbols.”'],demo:'Choose one sacramental sign and explain what it reveals through the senses.'},
8:{title:'The Eucharistic centre',module:'Sacraments and Christian Life',aim:'explain how the Eucharist is simultaneously memorial, sacrifice, real presence and communion.',reading:'Joseph Deharbe, Part III, Chapter II, The Holy Eucharist, §§1–3.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chap._II._The_Sacraments',ccc:'Catechism of the Catholic Church, 1322–1419',bible:'John 6:22–59 and 1 Corinthians 11:23–29',points:['Christ is truly present','The one sacrifice is made present','Communion unites Christ and Church'],surprise:'The Eucharist refuses the usual choice between symbol and reality. Its signs remain visible while the Church claims that what they signify is truly given.',obs:['“It is only a memorial meal.”','“The Mass crucifies Christ again.”','“Real Presence is medieval.”'],demo:'Explain how memorial, sacrifice, presence and communion describe one mystery.'},
9:{title:'Conscience and virtue',module:'Sacraments and Christian Life',aim:'understand conscience as a judgement that must be formed, and virtue as stable freedom for the good.',reading:'Joseph Deharbe, Part II, Chapter I and selected commandments: law, charity, sin and responsibility.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chap._I._The_Commandments_in_General_and_the_Chief_Commandment%2C',ccc:'Catechism of the Catholic Church, 1730–1802',bible:'Romans 12:1–2 and Matthew 22:34–40',points:['Freedom seeks the good','Conscience judges acts','Virtue forms character'],surprise:'Conscience is often used to end an argument. Catholic teaching uses it to begin a demanding process of judgement, formation and responsibility.',obs:['“A sincere conscience makes any act right.”','“Rules remove the need for judgement.”','“Virtue is only respectable behaviour.”'],demo:'Explain the difference between a sincere conscience and a well-formed conscience.'},
10:{title:'Learning to pray',module:'Prayer and Mission',aim:'understand prayer as a living relationship with God rather than a technique for supplying information or controlling outcomes.',reading:'Joseph Deharbe, Part III, teaching on prayer and the Lord’s Prayer.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion',ccc:'Catechism of the Catholic Church, 2558–2865',bible:'Luke 11:1–13 and Psalm 63',points:['Prayer is relationship','Christ teaches prayer','The Church forms prayer'],surprise:'Prayer appears inefficient because it is not primarily a technique for controlling outcomes. It is the practice of receiving life as relationship and gift.',obs:['“Prayer is talking to oneself.”','“Prayer should produce predictable results.”','“Learned prayer is less authentic.”'],demo:'Explain what changes when prayer is understood as relationship rather than information.'},
11:{title:'The common good',module:'Prayer and Mission',aim:'explain the common good through human dignity, solidarity and subsidiarity without reducing Catholic social teaching to party politics.',reading:'Joseph Deharbe, Part II, the chief commandment of charity and social duties within the commandments.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion/Chap._I._The_Commandments_in_General_and_the_Chief_Commandment%2C',ccc:'Catechism of the Catholic Church, 1877–1948 and 2401–2463',bible:'Acts 2:42–47 and Matthew 25:31–46',points:['Every person has dignity','Society serves flourishing','Solidarity and subsidiarity belong together'],surprise:'Catholic social teaching begins before party politics. It asks what human beings are, what society is for and which duties cannot be reduced to private preference.',obs:['“The common good means majority benefit.”','“Charity is private and justice political.”','“Subsidiarity only means smaller government.”'],demo:'Apply dignity, solidarity and subsidiarity to one ordinary local issue without naming a political party.'},
12:{title:'The lay apostolate',module:'Prayer and Mission',aim:'understand how Baptism gives lay Catholics a real vocation to serve Christ within family, work, parish and public life.',reading:'Joseph Deharbe, concluding teaching on Christian life, vocation and the duties of one’s state in life.',url:'https://en.wikisource.org/wiki/A_Complete_Catechism_of_the_Catholic_Religion',ccc:'Catechism of the Catholic Church, 897–913',bible:'Matthew 5:13–16 and 1 Peter 2:4–10',points:['Baptism gives a mission','The temporal order is a lay field','Apostolate begins in ordinary duties'],surprise:'Most Catholic witness happens where a priest is not present and may never be present: homes, workplaces, neighbourhoods and civic life.',obs:['“Mission belongs mainly to clergy.”','“Secular work is spiritually second-rate.”','“Apostolate means constant argument.”'],demo:'Name one ordinary responsibility through which a lay person can serve Christ’s mission without turning it into a performance.'}}
const n=Number(new URLSearchParams(location.search).get('n')),d=L[n],root=document.querySelector('#lesson-root');if(!d){root.innerHTML='<h1>Lesson not found</h1><p><a href="course.html">Return to the course</a></p>';throw new Error('Invalid lesson')}
document.title=`Lesson ${n}: ${d.title} | The Faith Experiment`;document.body.dataset.lessonId=`lesson-${String(n).padStart(2,'0')}`;const cards=d.points.map((p,i)=>`<article class="card lesson-tone-${['blue','gold','green'][i]}"><h3>${p}</h3><p>Rewrite this point in plain English and identify what it adds to the lesson.</p></article>`).join('');const obs=d.obs.map((o,i)=>`<article class="objection-card" style="--c:${['var(--blue)','var(--gold)','#819766'][i]}"><h3>${o}</h3><p>What distinction or evidence would be needed to test this claim fairly?</p></article>`).join('');root.innerHTML=`<div class="lesson-layout"><article class="lesson-main"><span class="eyebrow">Lesson ${n} · ${d.module}</span><h1>${d.title}</h1><p class="lead">Work through one stage at a time. Open the next section only when you have completed the present task.</p><div class="course-band"><strong>Lesson aim:</strong> ${d.aim}</div><details class="lesson-stage" open><summary><span class="step-number">1</span><div><span class="kicker">Encounter</span><h2>Begin with the question</h2></div></summary><div class="stage-body"><p>Before reading, record your present view without trying to produce the approved Catholic wording.</p><div class="notebook-box"><strong>Write briefly:</strong><ol class="question-list"><li>What do you presently think about this subject?</li><li>What do you think the Church teaches?</li><li>Which part seems obvious, difficult or surprising?</li><li>What would count as a satisfactory explanation?</li></ol></div></div></details><details class="lesson-stage"><summary><span class="step-number">2</span><div><span class="kicker">Primary reading</span><h2>Read Joseph Deharbe</h2></div></summary><div class="stage-body"><div class="reading-card"><p><strong>Read:</strong> ${d.reading}</p><p><a href="${d.url}" target="_blank" rel="noopener">Open the Deharbe text →</a></p><p class="small">Use the named part, chapter and section rather than page numbers, which vary by edition.</p></div><div class="instruction"><strong>First reading:</strong> read through once to grasp the direction of the argument before stopping to resolve every difficulty.</div></div></details><details class="lesson-stage"><summary><span class="step-number">3</span><div><span class="kicker">Read again and notice</span><h2>Take guided notes</h2></div></summary><div class="stage-body"><p>Read again in short sections. After each section, write four compact lines.</p><div class="note-method"><article><strong>1. Claim</strong><p>What is the author saying?</p></article><article><strong>2. Reason</strong><p>Why does he say it?</p></article><article><strong>3. Meaning</strong><p>Why does it matter?</p></article><article><strong>4. Question</strong><p>What remains unclear or needs checking?</p></article></div><div class="instruction"><strong>Vocabulary line:</strong> list unfamiliar Catholic or theological terms and consult the site glossary after attempting their meaning from context.</div><div class="notebook-box"><strong>At the end, add:</strong><ul><li>a five-sentence summary;</li><li>the strongest claim;</li><li>the least clear or least convincing claim;</li><li>your vocabulary list.</li></ul></div></div></details><details class="lesson-stage"><summary><span class="step-number">4</span><div><span class="kicker">Reveal the structure</span><h2>Make the central distinctions visible</h2></div></summary><div class="stage-body"><div class="grid">${cards}</div><div class="instruction"><strong>Why this is more interesting than it first appears:</strong> ${d.surprise}</div><div class="instruction"><strong>In your notebook:</strong> rewrite the three ideas in plain English and show how they belong together.</div></div></details><details class="lesson-stage"><summary><span class="step-number">5</span><div><span class="kicker">Controlling modern reference</span><h2>Read the Catechism and Scripture</h2></div></summary><div class="stage-body"><div class="source-box"><p><strong>Read:</strong> <a href="https://www.vatican.va/content/catechism/en.html" target="_blank" rel="noopener">${d.ccc}</a>.</p><p><strong>Then read:</strong> ${d.bible}.</p></div><p><strong>The modern Catechism is the authoritative reference for how the Church presents this teaching today.</strong></p><div class="instruction"><strong>Compare:</strong> note one clear agreement, one point the Catechism explains more fully, and one scriptural image or phrase that makes the teaching memorable.</div></div></details><details class="lesson-stage"><summary><span class="step-number">6</span><div><span class="kicker">Test the claim</span><h2>Face three objections</h2></div></summary><div class="stage-body"><div class="objection-grid">${obs}</div><div class="instruction"><strong>Choose the strongest objection.</strong> Explain why a thoughtful person might accept it, then answer it using this lesson’s distinctions and sources.</div></div></details><details class="lesson-stage"><summary><span class="step-number">7</span><div><span class="kicker">Write and demonstrate</span><h2>Make the learning visible</h2></div></summary><div class="stage-body"><div class="note-template"><div><h3>Notebook task</h3><p>Define the three central ideas in your own words.</p><p>Summarise Deharbe in no more than five sentences.</p><p>Record one serious remaining question.</p></div><div><h3>Demonstration</h3><p>${d.demo}</p><p>Do it once without notes, then correct or improve your explanation.</p></div></div></div></details><div class="journal-invite"><span class="kicker">After completing the lesson</span><h3>Compare with Alan’s journal</h3><p>Read Alan’s entry only after completing your own work. Compare the central claim, the objection that troubled you and anything the modern Catechism clarified.</p><p><a href="journal.html#lesson-${String(n).padStart(2,'0')}">See Alan’s Lesson ${n} journal entry →</a></p></div><div class="lesson-reflection"><span class="kicker">Final reflection</span><h3>Before leaving the lesson</h3><ol class="question-list"><li>Has this lesson helped you understand the Catholic faith more clearly? Why, or why not?</li><li>What part of the text did you find most convincing or most difficult?</li><li>Has your understanding changed since your starting notes?</li></ol></div><div class="lesson-actions"><a class="back-button" href="course.html">← Back to Course</a><button id="complete-lesson" class="complete-button" type="button">Mark lesson complete</button></div><p class="small muted">Completion is saved on this device and will appear on the Course page.</p></article><aside class="sidebar"><span class="kicker">Lesson ${n}</span><h3>${d.module}</h3><div class="progress"><span style="width:${Math.round(n/12*100)}%"></span></div><p class="small">A guided seven-stage lesson</p><div class="sidebar-note"><strong>Work in order</strong><p class="small">Your notes need not be polished; they need to show what you understood, questioned and corrected.</p></div><h3>Note pattern</h3><p class="small"><strong>Claim → Reason → Meaning → Question</strong><br>Then add unfamiliar vocabulary.</p><h3>Estimated time</h3><p>60–75 minutes, preferably away from notifications.</p><h3>Materials</h3><p>Deharbe, the modern Catechism, a Catholic Bible, ruled notebook and pen.</p></aside></div>`;const key='faith-experiment-completed-lessons',id=`lesson-${String(n).padStart(2,'0')}`,button=document.querySelector('#complete-lesson');let completed;try{completed=new Set(JSON.parse(localStorage.getItem(key)||'[]'))}catch{completed=new Set()}function render(){const done=completed.has(id);button.classList.toggle('done',done);button.textContent=done?'Lesson completed ✓':'Mark lesson complete';button.setAttribute('aria-pressed',String(done))}button.addEventListener('click',()=>{completed.has(id)?completed.delete(id):completed.add(id);localStorage.setItem(key,JSON.stringify([...completed]));render()});render();</script></body></html>
